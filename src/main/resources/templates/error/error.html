<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 발생 - MY따릉이</title>
    <link rel="stylesheet" th:href="@{/css/error/error.css}">
</head>
<body>
<div class="error-page">
    <div class="error-shell">

        <!-- 브랜드 -->
        <div class="brand-block">
            <div class="brand-icon-box">
                <svg class="brand-icon" viewBox="0 0 36 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="0" y="10" width="36" height="4" rx="2" fill="currentColor" opacity="0.7"/>
                    <rect x="4" y="0" width="28" height="4" rx="2" fill="currentColor"/>
                    <rect x="4" y="20" width="28" height="4" rx="2" fill="currentColor" opacity="0.5"/>
                </svg>
            </div>
            <p class="brand-name">MY따릉이</p>
        </div>

        <!-- 에러 카드 -->
        <div class="error-card">
            <div class="error-icon-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>

            <h1 class="error-title">오류가 발생했습니다</h1>

            <div class="error-message-box" th:if="${message}" th:text="${message}"></div>

            <p class="error-sub">
                일시적인 문제가 발생했습니다.<br>
                잠시 후 다시 시도하거나 홈으로 돌아가세요.
            </p>

            <div class="error-actions">
                <a href="/" class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    홈으로 돌아가기
                </a>
                <a href="javascript:history.back()" class="btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    이전 페이지
                </a>
            </div>
        </div>

        <p class="error-footer">문제가 지속되면 관리자에게 문의해주세요.</p>
    </div>
</div>
</body>
</html>
