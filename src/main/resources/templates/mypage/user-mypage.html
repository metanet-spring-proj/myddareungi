<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="#{user.mypage.title}">마이 페이지</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" th:href="@{/css/mypage/user-mypage.css}">
</head>
<body>
<div class="layout">

    <!-- 상단 네비게이션 -->
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <!-- 사이드바 -->
    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <!-- 메인 -->
    <main class="main-content" id="main-content"
          th:data-confirm-delete="#{msg.confirm.delete}"
          th:data-success-upload="#{msg.success.upload}"
          th:data-error-upload="#{msg.error.upload}"
          th:data-error-network="#{msg.error.network}"
          th:data-error-file-type="#{msg.error.fileType}"
          th:data-error-file-size="#{msg.error.fileSize}"
          th:data-uploading="#{msg.uploading}">

        <!-- 프로필 카드 (상단 전체 너비) -->
        <div class="card profile-card">
            <div class="profile-header">
                <div class="profile-info-wrap">
                    <div class="profile-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div>
                        <div class="profile-name" th:text="#{greeting.hello(${userName})}">
                            김지수 님, 안녕하세요
                        </div>
                        <div class="profile-sub" th:text="${userRoleInfo}">서울 따릉이 일반 사용자 / 데이터 분석팀</div>
                    </div>
                </div>
                <a th:href="@{/users/update}" class="edit-profile-btn" th:text="#{profile.edit}">정보 수정</a>
            </div>

            <div class="profile-meta">
                <div class="info-box">
                    <div class="label" th:text="#{profile.email}">이메일</div>
                    <div class="value" th:text="${userEmail}">jisoo.kim@seoulbike.kr</div>
                </div>
            </div>
        </div>

        <!-- 하단: 업로드 + 테이블 -->
        <div class="bottom-grid">

            <!-- 업로드 카드 -->
            <div class="card upload-card" id="uploadZone">
                <div class="upload-icon-box">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <div class="upload-title" th:text="#{upload.title}">데이터 업로드</div>
                <div class="upload-desc" th:text="#{upload.desc}">
                    CSV 파일을 이곳에 드래그하거나 버튼을 클릭하여 선택하세요
                </div>
                <form id="uploadForm">
                    <label for="csvFile" class="upload-btn">
                        <i class="fa-solid fa-folder-open"></i>
                        <span th:text="#{upload.btn}">파일 선택하기</span>
                    </label>
                    <input class="file-input" type="file" id="csvFile" name="file" accept=".csv">
                </form>
                <div class="upload-help" th:text="#{upload.help}">최대 용량: 50MB / 형식: .csv only</div>
                <div class="upload-progress" id="uploadProgress" style="display:none;">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <span class="progress-text" id="progressText" th:text="#{msg.uploading}">업로드 중...</span>
                </div>
            </div>

            <!-- 업로드 내역 테이블 -->
            <div class="card table-card">
                <div class="table-header">
                    <h3 th:text="#{table.title}">업로드 내역</h3>
                    <a th:href="@{/api/files}" th:text="#{table.viewall}">전체 보기</a>
                </div>

                <table>
                    <thead>
                    <tr>
                        <th th:text="#{table.header.name}">파일명</th>
                        <th th:text="#{table.header.date}">업로드 일시</th>
                        <th th:text="#{table.header.status}">상태</th>
                        <th th:text="#{table.header.action}">작업</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- 데이터 있을 때 -->
                    <tr th:each="file : ${fileList}" th:unless="${#lists.isEmpty(fileList)}">
                        <td>
                            <div class="file-info-cell">
                                <i class="fas fa-file-csv"></i>
                                <span th:text="${file.fileName}">traffic_data.csv</span>
                            </div>
                        </td>
                        <td>
                            <span class="date-text" th:text="${file.uploadAt}">
                                2024.05.15 14:20
                            </span>
                        </td>
                        <td>
                            <span th:if="${file.status == 'PENDING'}"
                                  class="status-badge badge-pending"
                                  th:text="#{status.pending}">대기</span>
                            <span th:if="${file.status == 'APPROVED'}"
                                  class="status-badge badge-approved"
                                  th:text="#{status.approved}">승인</span>
                            <span th:if="${file.status == 'REJECTED'}"
                                  class="status-badge badge-rejected"
                                  th:text="#{status.rejected}">반려</span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <!-- PENDING 상태일 때만 삭제 가능 -->
                                <button th:if="${file.status == 'PENDING'}"
                                        class="review-btn delete-btn"
                                        th:onclick="'deleteFile(' + ${file.fileId} + ')'"
                                        th:title="#{action.delete}">
                                    <i class="fas fa-trash"></i>
                                </button>
                                <!-- 다운로드 -->
                                <a th:href="@{/api/files/{fileId}/downloads(fileId=${file.fileId})}"
                                   class="review-btn download-btn"
                                   th:title="#{action.download}">
                                    <i class="fas fa-download"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <!-- 데이터 없을 때 -->
                    <tr th:if="${fileList == null or #lists.isEmpty(fileList)}">
                        <td colspan="4" class="empty-row">
                            <i class="fa-regular fa-folder-open"></i>
                            <span th:text="#{table.empty}">업로드된 파일이 없습니다.</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- 푸터 -->
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</div>

<script th:src="@{/js/mypage/user-mypage.js}"></script>
</body>
</html>
