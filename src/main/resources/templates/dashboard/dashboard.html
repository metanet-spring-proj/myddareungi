<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>따릉이 대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/notification/header-notification.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer th:src="@{/js/dashboard/dashboard.js}"></script>
	<script defer th:src="@{/js/notification/header-notification.js}"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="layout">
    <!-- 상단 네비게이션 -->
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <!-- 사이드바 -->
    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">
        <div id="dashboardContent">
            <!-- 기존 대시보드 내용 그대로 유지 -->
            <div class="dashboard-header">
                <div>
                    <h1>서울시 공공자전거 이용 분석 현황</h1>
                    <p class="data-date">데이터 기준: 2026년 01월 01일</p>
                </div>
                <button class="download-btn" onclick="downloadDashboard()">⬇ 리포트 다운로드</button>
            </div>

            <section class="kpi-grid">
                <!-- ... 생략 (기존 KPI 카드들) ... -->
                <div class="kpi-card">
                    <div class="kpi-top">
                        <span class="kpi-title">총 누적 이용건수</span>
                        <span class="kpi-icon">🚲</span>
                    </div>
                    <div class="kpi-value-row">
                        <span class="kpi-value" id="totalUseCnt">-</span>
                        <span class="kpi-unit">건</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-top">
                        <span class="kpi-title">총 누적 탄소절감량</span>
                        <span class="kpi-icon">🌿</span>
                    </div>
                    <div class="kpi-value-row">
                        <span class="kpi-value" id="totalCarbonSaved">-</span>
                        <span class="kpi-unit">톤</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-top">
                        <span class="kpi-title">총 대여소 수</span>
                        <span class="kpi-icon">📍</span>
                    </div>
                    <div class="kpi-value-row">
                        <span class="kpi-value" id="totalStationCnt">-</span>
                        <span class="kpi-unit">개</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-top">
                        <span class="kpi-title">평균 이용시간</span>
                        <span class="kpi-icon">⏱</span>
                    </div>
                    <div class="kpi-value-row">
                        <span class="kpi-value" id="avgUseTime">-</span>
                        <span class="kpi-unit">분</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-top">
                        <span class="kpi-title">최다 이용 자치구</span>
                        <span class="kpi-icon">🏆</span>
                    </div>
                    <div class="kpi-value kpi-value--sm" id="topDistrict">-</div>
                </div>
            </section>

            <section class="chart-row">
                <div class="chart-card chart-card--lg">
                    <div class="chart-title">월별 대여소 증설 및 이용건수 추이</div>
                    <div class="chart-box">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
                <div class="chart-card chart-card--md">
                    <div class="chart-title">자치구별 이용 밀도 히트맵</div>
                    <div class="map-box">
                        <div id="districtMap"></div>
                    </div>
                    <ul class="district-rank" id="districtRank"></ul>
                </div>
            </section>

            <section class="chart-row">
                <div class="chart-card chart-card--weekday">
                    <div class="chart-title">요일별 이용 패턴</div>
                    <div class="chart-box">
                        <canvas id="weekdayChart"></canvas>
                    </div>
                </div>
                <div class="chart-card chart-card--age">
                    <div class="chart-title">사용자 분포 (연령)</div>
                    <div class="chart-box">
                        <canvas id="ageGroupChart"></canvas>
                    </div>
                </div>
                <div class="chart-card chart-card--rent">
                    <div class="chart-title">권종별 이용 현황</div>
                    <div class="chart-box">
                        <canvas id="rentTypeChart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 푸터 -->
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</div>
</body>
</html>
