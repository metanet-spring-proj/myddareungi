<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title>따릉이 비밀번호 찾기</title>
    <link rel="stylesheet" th:href="@{/css/member/forgot-password.css}">
</head>
<body>
<main class="forgot-page">
    <section class="forgot-shell" aria-labelledby="forgot-title">
        <section class="forgot-card" aria-label="비밀번호 찾기 카드">
            <div class="forgot-icon-box" aria-hidden="true">
                <svg class="forgot-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9.75 9.75A2.25 2.25 0 1 1 14.25 9.75C14.25 11.0625 13.125 11.625 12.375 12.1875C11.8125 12.6094 11.625 12.9375 11.625 13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M12 17.25H12.0113" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C13.5807 3 15.0662 3.40756 16.3563 4.1223" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M17 3.75V7.75H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M21 7.75L16.5 3.25" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <header class="forgot-header">
                <h1 id="forgot-title">비밀번호 찾기</h1>
                <p>비밀번호를 찾기 위해 아이디와 이메일 정보를 입력해 주세요.</p>
            </header>

            <div id="forgot-error" class="forgot-message error-message" hidden></div>
            <div id="forgot-success" class="forgot-message success-message" hidden></div>

            <form id="forgot-form" class="forgot-form" novalidate>
                <div class="field-group">
                    <label for="loginId">아이디</label>
                    <div class="input-wrap with-icon">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17 19.5V18.4C17 17.28 17 16.72 16.78 16.292C16.5865 15.9123 16.2777 15.6035 15.898 15.41C15.47 15.188 14.91 15.188 13.79 15.188H10.21C9.09 15.188 8.53 15.188 8.102 15.41C7.72234 15.6035 7.41347 15.9123 7.22 16.292C7 16.72 7 17.28 7 18.4V19.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </span>
                        <input id="loginId" name="loginId" type="text" placeholder="아이디를 입력하세요" autocomplete="username" required>
                    </div>
                </div>

                <div class="field-group">
                    <label for="email">이메일</label>
                    <div class="input-wrap with-icon">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4.5 7.5L10.5457 12.0325C11.3803 12.6584 11.7977 12.9714 12.2575 13.0924C12.6636 13.1992 13.0895 13.1992 13.4956 13.0924C13.9554 12.9714 14.3727 12.6584 15.2074 12.0325L21.25 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <rect x="3.5" y="5.5" width="17" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </span>
                        <input id="email" name="email" type="email" placeholder="example@seoul.go.kr" autocomplete="email" required>
                    </div>
                </div>

                <section id="verification-section" class="verification-section" hidden aria-live="polite">
                    <div class="verification-head">
                        <span class="verification-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 3L18 5.5V11.3C18 15.1278 15.4806 18.5754 12 19.5C8.51944 18.5754 6 15.1278 6 11.3V5.5L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <path d="M9.5 11.5L11.25 13.25L14.75 9.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <span>본인 확인 절차</span>
                    </div>

                    <div class="field-group">
                        <label for="question">비밀번호 찾기 질문</label>
                        <div class="input-wrap">
                            <input id="question" name="question" type="text" readonly>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="answer">비밀번호 찾기 답변</label>
                        <div class="input-wrap">
                            <input id="answer" name="answer" type="text" placeholder="답변을 입력하세요" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="newPassword">새 비밀번호</label>
                        <div class="input-wrap">
                            <input id="newPassword" name="newPassword" type="password" placeholder="새 비밀번호를 입력하세요" autocomplete="new-password" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="newPasswordConfirm">새 비밀번호 확인</label>
                        <div class="input-wrap">
                            <input id="newPasswordConfirm" name="newPasswordConfirm" type="password" placeholder="새 비밀번호를 다시 입력하세요" autocomplete="new-password" required>
                        </div>
                    </div>
                </section>

                <button id="forgot-submit" class="forgot-button" type="submit">비밀번호 찾기</button>
            </form>

            <div class="forgot-links">
                <a class="return-link" th:href="@{/login}">로그인으로 돌아가기</a>
                <p>계정이 없으신가요? <a th:href="@{/signup}">회원가입</a></p>
            </div>
        </section>

        <footer class="forgot-footer">
            <p>© 2025 Seoul Metropolitan Government. All Data sourced from Seoul Public Data Portal.</p>
            <div class="footer-links">
                <a href="#" onclick="return false;">Privacy Policy</a>
                <a href="#" onclick="return false;">Terms of Service</a>
                <a href="#" onclick="return false;">API Documentation</a>
            </div>
        </footer>
    </section>
</main>

<script th:inline="javascript">
    (() => {
        const form = document.getElementById('forgot-form');
        const verificationSection = document.getElementById('verification-section');
        const questionInput = document.getElementById('question');
        const errorBox = document.getElementById('forgot-error');
        const successBox = document.getElementById('forgot-success');
        const submitButton = document.getElementById('forgot-submit');
        const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
        const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
        const csrfToken = csrfTokenMeta ? csrfTokenMeta.content : '';
        const csrfHeader = csrfHeaderMeta ? csrfHeaderMeta.content : 'X-CSRF-TOKEN';
        let questionLoaded = false;

        const buildHeaders = () => {
            const headers = { 'Content-Type': 'application/json' };
            if (csrfToken) {
                headers[csrfHeader] = csrfToken;
            }
            return headers;
        };

        const showMessage = (element, message) => {
            element.textContent = message;
            element.hidden = false;
        };

        const clearMessages = () => {
            errorBox.hidden = true;
            successBox.hidden = true;
            errorBox.textContent = '';
            successBox.textContent = '';
        };

        const toggleSubmitting = (isSubmitting) => {
            submitButton.disabled = isSubmitting;
            if (!questionLoaded) {
                submitButton.textContent = isSubmitting ? '질문 확인 중...' : '비밀번호 찾기';
                return;
            }
            submitButton.textContent = isSubmitting ? '재설정 중...' : '비밀번호 재설정';
        };

        const readTrimmed = (name) => {
            const value = form.elements[name].value;
            return typeof value === 'string' ? value.trim() : value;
        };

        const loadQuestion = async (payload) => {
            return fetch('/api/v1/auth/password/question', {
                method: 'POST',
                headers: buildHeaders(),
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            });
        };

        const resetPassword = async (payload) => {
            return fetch('/api/v1/auth/password/reset', {
                method: 'POST',
                headers: buildHeaders(),
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            });
        };

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessages();

            const basePayload = {
                loginId: readTrimmed('loginId'),
                email: readTrimmed('email')
            };

            toggleSubmitting(true);

            try {
                if (!questionLoaded) {
                    const response = await loadQuestion(basePayload);
                    const result = await response.json().catch(() => null);

                    if (!response.ok || !result?.success) {
                        showMessage(errorBox, result?.message || '입력한 정보가 일치하지 않습니다.');
                        return;
                    }

                    questionInput.value = result.question || '';
                    verificationSection.hidden = false;
                    questionLoaded = true;
                    submitButton.textContent = '비밀번호 재설정';
                    showMessage(successBox, '비밀번호 찾기 질문을 확인했습니다. 답변과 새 비밀번호를 입력해주세요.');
                    form.elements.answer.focus();
                    return;
                }

                const payload = {
                    ...basePayload,
                    answer: readTrimmed('answer'),
                    newPassword: form.elements.newPassword.value,
                    newPasswordConfirm: form.elements.newPasswordConfirm.value
                };

                if (payload.newPassword !== payload.newPasswordConfirm) {
                    showMessage(errorBox, '새 비밀번호 확인이 일치하지 않습니다.');
                    return;
                }

                const response = await resetPassword(payload);
                const result = await response.json().catch(() => null);

                if (!response.ok || !result?.success) {
                    showMessage(errorBox, result?.message || '비밀번호 재설정 중 오류가 발생했습니다.');
                    return;
                }

                showMessage(successBox, result.message || '비밀번호가 재설정되었습니다. 로그인 페이지로 이동합니다.');
                submitButton.disabled = true;
                window.setTimeout(() => {
                    window.location.href = '/login?reset=1';
                }, 1200);
            } catch (error) {
                showMessage(errorBox, '요청 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                if (!successBox.hidden && successBox.textContent.includes('로그인 페이지로 이동합니다.')) {
                    return;
                }
                toggleSubmitting(false);
            }
        });
    })();
</script>
</body>
</html>
